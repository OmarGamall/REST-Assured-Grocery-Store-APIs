# Target environment (production, testing) default = production
env=production
production.baseUrl=https://simple-grocery-store-api.click
testing.baseUrl=https://testing.simple-grocery-store-api.click

# API Bearer Token
# If populated, the framework will use this token for all tests.
# If left blank, it will register a fresh API client once at suite start.
api.token=

# Default client name and email to use when registering a new API client.
# If left blank, they will be dynamically generated using Faker.
client.name=
client.email=


